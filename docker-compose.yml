services:
  postgres:
    image: ankane/pgvector:latest
    container_name: codeinsight-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codeinsight}
      POSTGRES_USER: ${POSTGRES_USER:-codeinsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codeinsight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeinsight -d codeinsight"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: codeinsight-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: codeinsight-meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-codeinsight_master_key}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./codeinsight-backend
      dockerfile: Dockerfile
    container_name: codeinsight-backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-codeinsight}
      POSTGRES_USER: ${POSTGRES_USER:-codeinsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codeinsight}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY:-codeinsight_master_key}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: ./codeinsight-backend
      dockerfile: Dockerfile
    container_name: codeinsight-celery-worker
    command: ["uv", "run", "celery", "-A", "tasks", "worker", "--loglevel=info"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-codeinsight}
      POSTGRES_USER: ${POSTGRES_USER:-codeinsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codeinsight}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY:-codeinsight_master_key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./codeinsight-frontend
      dockerfile: Dockerfile
    container_name: codeinsight-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  meilisearch_data: