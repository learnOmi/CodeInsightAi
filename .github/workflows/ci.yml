name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: |
          cd codeinsight-backend
          uv sync --group dev
      - name: Lint
        run: cd codeinsight-backend && uv run ruff check .
      - name: Type check
        run: cd codeinsight-backend && uv run mypy codeinsight
      - name: Test
        run: cd codeinsight-backend && uv run pytest --cov=codeinsight --cov-report=xml

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: codeinsight-frontend/package-lock.json
      - name: Install dependencies
        run: cd codeinsight-frontend && npm ci
      - name: Lint
        run: cd codeinsight-frontend && npm run lint
      - name: Type check
        run: cd codeinsight-frontend && npm run typecheck
      - name: Build
        run: cd codeinsight-frontend && npm run build
