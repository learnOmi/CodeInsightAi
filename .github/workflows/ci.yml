name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('codeinsight-backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-
      - name: Install dependencies
        working-directory: codeinsight-backend
        run: uv sync --extra dev
      - name: Lint
        working-directory: codeinsight-backend
        run: uv run ruff check . --fix
      - name: Type check
        working-directory: codeinsight-backend
        run: uv run mypy codeinsight
      - name: Test
        working-directory: codeinsight-backend
        run: uv run pytest --cov=codeinsight --cov-report=xml

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        working-directory: codeinsight-frontend
        run: npm run lint
      - name: Type check
        working-directory: codeinsight-frontend
        run: npm run typecheck
      - name: Build
        working-directory: codeinsight-frontend
        run: npm run build
