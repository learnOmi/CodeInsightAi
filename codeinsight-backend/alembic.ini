[alembic]
script_location = alembic
prepend_sys_path = .
version_locations = %(here)s/alembic/versions

# SQLAlchemy URL — 实际值由 alembic/env.py 从 config.py 的 settings.database_url 覆盖，
# 此处仅作为文档说明默认格式。
sqlalchemy.url = postgresql+asyncpg://codeinsight:codeinsight@localhost:5432/codeinsight

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
