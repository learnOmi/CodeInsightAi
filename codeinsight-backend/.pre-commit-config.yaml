repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: ruff
        language: system
        types: [python]
        args: ["check", "--fix"]
        files: ^codeinsight-backend/codeinsight/
      - id: ruff-format
        name: ruff-format
        entry: ruff
        language: system
        types: [python]
        args: ["format"]
        files: ^codeinsight-backend/codeinsight/
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false
        args: ["--ignore-missing-imports", "codeinsight-backend/codeinsight/"]
        files: ^codeinsight-backend/codeinsight/
        always_run: true

  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend-lint
        entry: npm
        language: system
        args: ["--prefix", "codeinsight-frontend", "run", "lint"]
        types: [file]
        files: ^codeinsight-frontend/src/
        pass_filenames: false
        always_run: true
      - id: frontend-typecheck
        name: frontend-typecheck
        entry: npm
        language: system
        args: ["--prefix", "codeinsight-frontend", "run", "typecheck"]
        types: [file]
        files: ^codeinsight-frontend/src/
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      - id: eval-smoke
        name: eval-smoke
        entry: bash -c "cd \"$(git rev-parse --show-toplevel)\" && python scripts/eval_smoke.py"
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        files: ^codeinsight-backend/codeinsight/evaluation/
